name: CI
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [book-service, loan-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: maven
      - name: Tests + couverture
        run: mvn -B verify
        working-directory: ${{ matrix.module }}
